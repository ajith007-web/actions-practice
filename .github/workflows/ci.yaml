name: CI Practice Pipeline

on:
  workflow_dispatch: # Allows you to run it manually to test the cache

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # 🛠️ TASK 1: Modify this step to cache your node_modules
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      # 🛠️ Hand-crafted NPM Cache (No lockfile required)
      - name: Cache Global NPM Directory
        uses: actions/cache@v4
        with:
          path: ~/.npm
          # Uses a generic static key that updates daily, bypassing lockfile hashes
          key: ${{ runner.os }}-npm-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-npm-cache-
                
      - name: Install dependencies
        run: npm install

      - name: Run Build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🛠️ TASK 2: Add caching arguments to this Docker build step
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # We don't need to push for this test
          tags: cache-practice:latest
          cache-from: type=gha # Tells Docker to look for layers in GitHub cache
          cache-to: type=gha,mode=max